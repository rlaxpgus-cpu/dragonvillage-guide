    <ul>
      <li>수집점수를 올려 테이머 등급을 높이는 것이 가장 중요하다.</li>
      <li>새로운 드래곤과 새로운 성격을 얻으면 점수가 오른다.</li>
      <li>보호소와 드링크를 적극 활용하면 성장 속도가 빨라진다.</li>
      <li>버블, 에그, 리베티는 초반 필수 드래곤이다.</li>
      <li>도감 점수가 막히면 매니아 작업이 도움이 된다.</li>
      <li>성격작은 초반보다 중반 이후에 시작하는 편이 효율적이다.</li>
      <li>부족한 드래곤은 거래소를 통해 확보할 수 있다.</li>
    </ul>
