import fs from "fs";

// 기존 데이터 읽기
let existing = [];
try {
  const raw = fs.readFileSync("notices.json", "utf-8");
  existing = JSON.parse(raw);
} catch {
  existing = [];
}

// 🔹 1. [업데이트] 필터링
const filteredNew = scrapedNotices.filter(n =>
  !n.title.includes("[업데이트]")
);

// 🔹 2. 기존 + 신규 합치기
const merged = [...filteredNew, ...existing];

// 🔹 3. link 기준 중복 제거
const uniqueMap = new Map();
for (const notice of merged) {
  if (!notice.link) continue;
  uniqueMap.set(notice.link, notice);
}
const uniqueList = Array.from(uniqueMap.values());

// 🔹 4. 최신순 정렬 (date 있으면)
uniqueList.sort((a, b) => {
  return new Date(b.date) - new Date(a.date);
});

// 🔹 5. 최신 5개만 유지
const finalNotices = uniqueList.slice(0, 5);

// 🔹 6. 저장
fs.writeFileSync(
  "notices.json",
  JSON.stringify(finalNotices, null, 2)
);

console.log("공지 업데이트 완료:", finalNotices.length, "개");
